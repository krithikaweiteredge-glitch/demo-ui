# ──────────────────────────────────────────────────────────────────────────────
# NovaSpark Demo UI — CI/CD Pipeline
# Deploys to AWS EC2 via SSH on every push to "main"
#
# NO ECS / ECR / CodeDeploy / AWS credentials used.
# Only SSH-based deployment.
#
# ── GitHub Secrets required (Settings → Secrets → Actions) ────────────────────
#
#   EC2_HOST          — Public IP or domain of your EC2 instance
#                       e.g.  3.108.12.14  or  krithikapawar-react.duckdns.org
#
#   EC2_USER          — SSH login username (almost always: ubuntu)
#
#   EC2_SSH_KEY       — Contents of your EC2 private key (.pem file)
#                       Open your .pem file, copy everything including
#                       -----BEGIN RSA PRIVATE KEY----- and
#                       -----END RSA PRIVATE KEY-----
#                       Paste the full text as the secret value.
#
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to EC2 via SSH

# ── Trigger ───────────────────────────────────────────────────────────────────
# This workflow runs automatically whenever code is pushed to the main branch.
on:
  push:
    branches: ["main"]

# ── Permissions ───────────────────────────────────────────────────────────────
# Read-only access to the repository contents is enough.
permissions:
  contents: read

jobs:
  # ── Job 1: CI — Install, Lint, Build ────────────────────────────────────────
  # This job runs on a fresh GitHub-hosted Ubuntu machine.
  # It verifies the code builds correctly before we deploy anything.
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository code onto the GitHub runner.
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Install the correct Node.js version and enable npm caching
      # so dependencies download faster on repeated runs.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Install all npm packages listed in package-lock.json.
      # "npm ci" is preferred over "npm install" in CI because it:
      #   - Uses package-lock.json exactly (no version drift)
      #   - Fails if lock file is out of sync
      #   - Cleans node_modules before installing
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the linter if a lint script exists in package.json.
      # "--if-present" means the step is skipped if there's no lint script.
      - name: Lint
        run: npm run lint --if-present

      # Step 5: Build the production bundle with Vite.
      # Output goes into the "dist/" folder.
      - name: Build Vite app
        run: npm run build

  # ── Job 2: Deploy to EC2 via SSH ────────────────────────────────────────────
  # This job only runs if the build job above passes successfully.
  # It SSHes into your EC2 server and deploys the latest code.
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build          # ← waits for build job to pass before running
    environment: production

    steps:
      # Step 1: Download the repository code again (each job gets a clean runner).
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: SSH into the EC2 instance and run the deployment commands.
      #
      # How it works:
      #   - appleboy/ssh-action connects to your EC2 via SSH
      #   - It uses the private key you stored in GitHub Secrets
      #   - It runs the "script" block as a series of shell commands on EC2
      #
      # What happens on EC2:
      #   1. cd into the project directory
      #   2. git pull to download the latest code from GitHub
      #   3. npm install to install any new/updated dependencies
      #   4. npm run build to generate the fresh "dist/" folder
      #   5. sudo cp to overwrite Nginx's web root with the new build
      #   6. sudo nginx -t to verify the Nginx config has no syntax errors
      #   7. sudo systemctl reload nginx to apply without dropping connections
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          # The public IP or domain name of your EC2 instance
          host: ${{ secrets.EC2_HOST }}

          # The SSH username (ubuntu for Ubuntu-based EC2 instances)
          username: ${{ secrets.EC2_USER }}

          # The private key (.pem file contents) stored as a GitHub Secret
          key: ${{ secrets.EC2_SSH_KEY }}

          # Shell commands to run on EC2 after connecting
          script: |

            # ── Navigate to the project directory ────────────────────────────
            # This is where your project was cloned on EC2.
            # If your path is different, update this line.
            cd /home/ubuntu/demo-ui

            # ── Pull latest code from GitHub ─────────────────────────────────
            # Downloads the newest commits from the main branch.
            git pull origin main

            # ── Install / update Node dependencies ───────────────────────────
            # Installs any new packages added since the last deployment.
            npm install

            # ── Build the React/Vite app ──────────────────────────────────────
            # Compiles the source code into optimised static files in ./dist
            npm run build

            # ── Copy build output to Nginx web root ──────────────────────────
            # Overwrites the current files served by Nginx with the new build.
            # -r  = recursive (copies folders too)
            # -f  = force overwrite without prompting
            sudo cp -rf dist/* /var/www/html/

            # ── Validate Nginx configuration ─────────────────────────────────
            # Tests that nginx.conf has no syntax errors before reloading.
            # If this fails, Nginx is NOT reloaded (safe deployment).
            sudo nginx -t

            # ── Reload Nginx gracefully ───────────────────────────────────────
            # "reload" applies the new config without dropping active connections.
            # Use "restart" only if you change the main nginx.conf file.
            sudo systemctl reload nginx

      # Step 3: Print a deployment summary to the GitHub Actions UI.
      - name: Deployment summary
        run: |
          echo "### ✅ Deployed to EC2 via SSH" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
